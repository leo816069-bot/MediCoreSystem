<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCore Systems - Iniciar Sesión</title>
    <!-- Vinculamos el CSS general desde la carpeta superior -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-body">

    <!-- Contenedor central del Login -->
    <main class="login-card">
        <div class="login-header">
            <div class="nav-logo">
                <strong>MediCore</strong><span>Systems</span>
            </div>
            <h2>Bienvenido de nuevo</h2>
            <p>Ingresa tus credenciales para acceder al sistema clínico</p>
        </div>

        <!-- Formulario de Acceso -->
        <form class="login-form" action="#" method="POST">
            <div class="form-group">
                <!-- NUEVO: Selector de Rol Clínico -->
                <div class="form-element" style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; text-align: left;">
                    <label for="role" style="font-weight: 600; font-size: 0.9rem; color: #334155;">Tipo de Cuenta / Rol</label>
                    <select id="role" style="padding: 0.75rem 1rem; border: 1px solid rgba(100, 116, 139, 0.2); border-radius: 8px; font-size: 0.95rem; background-color: #ffffff; color: #334155; width: 100%; box-sizing: border-box; cursor: pointer;">
                        <option value="medico"> Médico / Especialista</option>
                        <option value="admin"> Administrador (Dueño)</option>
                        <option value="finanzas"> Control de Caja y Finanzas</option>
                    </select>
                </div>
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@medicore.com" required>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between;">
                    <label for="loginPassword">Contraseña</label>
                    <a href="#" class="forgot-link">¿La olvidaste?</a>
                </div>
                
                <!-- Contenedor relativo para posicionar el botón encima del input -->
                <div style="position: relative; width: 100%;">
                    <input 
                        type="password" 
                        id="loginPassword" 
                        minlength="8" 
                        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[A-Za-z\d]{8,}$"
                        title="La contraseña debe tener al menos 8 caracteres, incluir letras mayúsculas, minúsculas y números, sin espacios ni caracteres especiales."
                        required
                        style="width: 100%; padding-right: 40px; box-sizing: border-box;"
                    >
                    <!-- Botón del ojo interactivo -->
                    <button type="button" id="btnTogglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 0; line-height: 1;">
                        👁️
                    </button>
                </div>
                
                <!-- Contenedor dinámico para mostrar el error de validación -->
                <div id="errorPassword" style="color: #ef4444; font-size: 0.8rem; margin-top: 4px; display: none;"></div>
            </div>

            <!-- Botón de Entrada Interactiva -->
            <button type="submit" class="btn-primary btn-login-submit">Ingresar al Panel</button>
        </form>

        <div class="login-footer">
            <p>¿Tu clínica no está registrada? <a href="../index.html">Volver al inicio</a></p>
        </div>
    </main>
    
    <script src="js/login.js"></script>

</body>
</html>
